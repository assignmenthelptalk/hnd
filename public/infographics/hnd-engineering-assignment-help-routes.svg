  <text x="476" y="405" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Control: Bode plot (gain/phase</text>
  <text x="476" y="419" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">margin) + PID Ziegler-Nichols</text>
  <text x="476" y="433" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">→ evaluate Z-N limitations</text>
  <text x="476" y="447" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">EMC analysis in PCB design</text>

