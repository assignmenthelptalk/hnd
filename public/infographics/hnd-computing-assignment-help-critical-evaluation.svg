  <text x="44" y="192" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Enterprise frameworks:</text>
  <text x="44" y="206" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">TOGAF ADM phases (8)</text>
  <text x="44" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Zachman 6×6 matrix</text>
  <text x="44" y="234" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Advanced UML: component,</text>
  <text x="44" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">deployment, activity diagrams</text>
  <line x1="44" y1="256" x2="196" y2="256" stroke="#E5E7EB" stroke-width="1"/>
  <text x="44" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">Distinction eval.:</text>
  <text x="44" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Architecture vs strategic obj.</text>
  <text x="44" y="298" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Security + scalability limits</text>
