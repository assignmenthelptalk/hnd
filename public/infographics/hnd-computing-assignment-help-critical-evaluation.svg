<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" role="img" aria-labelledby="hnd-computing-title">
  <title id="hnd-computing-title">HND Computing Critical Evaluation Standard: TOGAF Zachman Enterprise Architecture, OSPF BGP SDN Zero Trust Security, SAFe DevOps Microservices Monolithic Trade-Off, Professional Practice Research Project IEEE Harvard Referencing</title>

  <!-- Background -->
  <rect width="800" height="600" fill="#F4F7FB" rx="14"/>
  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">HND Computing: Degree-Equivalent Critical Evaluation Framework</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Level 5 = Evaluate Against Enterprise Standards · Trade-Off Analysis · Professional Recommendations with Limitations</text>

  <!-- Critical standard banner -->
  <rect x="28" y="82" width="744" height="30" rx="6" fill="#DC2626"/>
  <text x="400" y="97" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">HNC Level 4: justify WHY you chose X over Y → HND Level 5: critically evaluate whether X meets enterprise standards and what X sacrifices</text>
  <text x="400" y="109" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FECACA">Pass = correct implementation · Merit = trade-off analysis · Distinction = evaluation against enterprise standard + limitations + professional recommendation</text>

  <!-- 4 units header -->
  <rect x="28" y="126" width="744" height="22" rx="4" fill="#2563EB"/>
  <text x="400" y="141" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">4 CORE UNITS — Enterprise-Level Frameworks and Distinction Evaluation Criteria</text>

