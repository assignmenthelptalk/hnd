  <!-- Trade-off example -->
  <rect x="28" y="350" width="744" height="76" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="44" y="368" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">DISTINCTION RECOMMENDATION PATTERN — Specific Trade-Off Analysis</text>
  <text x="44" y="384" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#DC2626">Merit level:</text>
  <text x="120" y="384" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">"Microservices would improve scalability for this system and allow independent deployment of services."</text>
  <text x="44" y="400" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#7C3AED">Distinction level:</text>
  <text x="130" y="400" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">"Microservices for the payment service reduces deployment risk (independent releases) at the cost of distributed transaction complexity requiring</text>
  <text x="130" y="414" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">the Saga pattern — a trade-off appropriate here given the high release frequency and low transaction complexity relative to a full banking context."</text>

  <!-- HNC vs HND transition strip -->
