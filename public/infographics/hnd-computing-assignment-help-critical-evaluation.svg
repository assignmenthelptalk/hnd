  <text x="309" y="171" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">NETWORKING</text>
  <text x="236" y="192" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#374151">Enterprise protocols:</text>
  <text x="236" y="206" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">OSPF (intra-domain, link-state)</text>
  <text x="236" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">BGP (inter-domain, path-vector)</text>
  <text x="236" y="234" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">MPLS + SDN (control/data plane)</text>
  <text x="236" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Zero-trust: never trust, always verify</text>
  <line x1="236" y1="256" x2="388" y2="256" stroke="#E5E7EB" stroke-width="1"/>
  <text x="236" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">Distinction eval.:</text>
  <text x="236" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Zero-trust: implementation reqs</text>
  <text x="236" y="298" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">SDN vs MPLS trade-off for scale</text>
  <text x="236" y="312" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">SIEM vs threat model eval.</text>
  <text x="236" y="326" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#D97706">CIA triad: Confidentiality/Integrity/Availability</text>

