  <text x="400" y="455" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">HNC Level 4: "Why star over ring?" → HND Level 5: "Does this enterprise architecture meet zero-trust and SDN scalability requirements for an org of this complexity?"</text>
